<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subir Imagen</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <div class="container">
    <h1>Subir Imagen</h1>
    <div id="drop-area">
      <p>Arrastra y suelta tu imagen aquí</p>
      <p>o haz clic para seleccionar un archivo</p>
      <input type="file" id="fileElem" accept=".arw, image/jpeg" style="display:none">
    </div>
    <div id="progress-bar-container">
      <div id="progress-bar"></div>
    </div>
    <div id="result"></div>
  </div>

  <script>
    const dropArea = document.getElementById('drop-area');
    const fileInput = document.getElementById('fileElem');
    const progressBarContainer = document.getElementById('progress-bar-container');
    const progressBar = document.getElementById('progress-bar');
    const resultDiv = document.getElementById('result');

    // Evitar comportamiento por defecto en eventos de drag & drop
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, preventDefaults, false);
      document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults (e) {
      e.preventDefault();
      e.stopPropagation();
    }

    // Añadir o quitar clase para efecto visual
    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => dropArea.classList.add('hover'), false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, () => dropArea.classList.remove('hover'), false);
    });

    // Permitir seleccionar archivo haciendo clic en el área
    dropArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) {
        handleFiles(fileInput.files);
      }
    });
    dropArea.addEventListener('drop', (e) => {
      let dt = e.dataTransfer;
      let files = dt.files;
      handleFiles(files);
    });

    function handleFiles(files) {
      ([...files]).forEach(uploadFile);
    }

    function uploadFile(file) {
      const url = '/upload';
      const xhr = new XMLHttpRequest();
      const formData = new FormData();
      xhr.open('POST', url, true);

      // Actualizar barra de progreso
      xhr.upload.addEventListener("progress", (e) => {
        if (e.lengthComputable) {
          const percentComplete = (e.loaded / e.total) * 100;
          progressBar.style.width = percentComplete + '%';
          progressBarContainer.style.display = 'block';
        }
      });

      xhr.addEventListener('readystatechange', function() {
        if (xhr.readyState == 4) {
          if(xhr.status === 200) {
            // Mostrar la imagen procesada
            const arrayBufferView = new Uint8Array(xhr.response);
            const blob = new Blob([arrayBufferView], {type: "image/jpeg"});
            const urlCreator = window.URL || window.webkitURL;
            const imageUrl = urlCreator.createObjectURL(blob);
            resultDiv.innerHTML = '<p>Imagen subida correctamente:</p><img src="' + imageUrl + '" style="max-width:100%;">';
          } else {
            resultDiv.innerHTML = '<p>Error al subir la imagen.</p>';
          }
          // Resetear la barra de progreso
          progressBar.style.width = '0%';
          progressBarContainer.style.display = 'none';
        }
      });

      xhr.responseType = 'arraybuffer';
      formData.append('image', file);
      xhr.send(formData);
    }
  </script>
</body>
</html>
